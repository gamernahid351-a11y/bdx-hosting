{% extends 'base.html' %}
{% block title %}Login — BDX Hosting{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h1>Welcome <span class="red">Back</span></h1>
    <p>Login to manage your servers and hosting</p>
    <form class="auth-form" method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="you@example.com" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-red" style="width:100%;justify-content:center;padding:13px">Login →</button>
    </form>
    <div class="auth-link">
      Don't have an account? <a href="{{ url_for('register') }}">Register free</a>
    </div>
    <hr class="divider">
    <div style="text-align:center;font-size:0.82rem;color:var(--text3)">
      Need help? <a href="https://t.me/proxaura" target="_blank" class="tg-link">Contact admin on Telegram</a>
    </div>
  </div>
</div>
{% endblock %}
